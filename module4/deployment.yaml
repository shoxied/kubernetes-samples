apiVersion: apps/v1
kind: Deployment
metadata:
  name: podinfo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: podinfo
  template:
    metadata:
      labels:
        app: podinfo
    spec:
      securityContext: 
        fsGroup: 1
      containers:
        - name: podinfo
          image: ghcr.io/stefanprodan/podinfo:6.6.3
          ports:
            - name: http
              containerPort: 9898
              protocol: TCP
