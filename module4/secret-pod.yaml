apiVersion: v1
kind: Secret
metadata:
  name: test-credentials
type: Opaque
data:
  access_key: QUtJQVJGR1ZCQlFF                # base64 от "AKIAFGVBQEQ"
  secret_key: U09NRV9TRUNSRVRfS0VZCg==  # base64 от "SOME_SECRET_KEY"
---
apiVersion: v1
kind: Pod
metadata:
  name: test-pod
spec:
  containers:
    - name: test-container
      image: alpine
      command: ["/bin/sh", "-c", "echo My Secret key: $MY_SECRET"]
      env:
        - name: MY_SECRET
          valueFrom:
            secretKeyRef:
              name: test-credentials
              key: secret_key