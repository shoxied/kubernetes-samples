apiVersion: apps/v1
kind: Deployment
metadata:
  name: podinfo-blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: podinfo
      env: blue
  template:
    metadata:
      labels:
        app: podinfo
        env: blue
    spec:
      containers:
        - name: podinfo
          image: stefanprodan/podinfo:6.7.0
          ports:
            - containerPort: 9898