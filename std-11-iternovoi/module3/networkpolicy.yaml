apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: networkpolicy
spec:
  podSelector:
    matchExpressions:
      - {key: app, operator: In, values: [productpage, reviews, details, ratings]}
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchExpressions:
              - {key: app, operator: In, values: [reviews, productpage, ratings]}
